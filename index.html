<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobin Hesap Pro V2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --input-bg: #334155;
            --primary-btn: #3b82f6;
            --warning-color: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-primary); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 500px; padding-bottom: 50px; }

        .header { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .header img { width: 64px; height: 64px; border-radius: 12px; margin-bottom: 10px; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }

        h3 { margin-top: 0; font-size: 1.1rem; color: var(--accent-color); border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; }

        .input-group { margin-bottom: 12px; }
        
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 5px; font-weight: 600; }

        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid transparent;
            background: var(--input-bg); color: white; font-size: 1rem;
        }

        input:focus { outline: none; border-color: var(--primary-btn); }
        input[readonly] { background: #0f172a; color: var(--accent-color); font-weight: bold; }

        .progress-container { background: #334155; height: 28px; border-radius: 14px; margin: 15px 0; overflow: hidden; }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #10b981, #34d399);
            width: 0%; transition: width 0.4s; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;
        }

        .result-box {
            background: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--primary-btn);
            padding: 15px; border-radius: 4px; margin-top: 10px; font-size: 0.9rem; line-height: 1.6;
        }

        button {
            width: 100%; padding: 14px; border-radius: 8px; border: none;
            background: var(--primary-btn); color: white; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        button.secondary { background: var(--accent-color); }
        button.outline { background: transparent; border: 1px solid var(--primary-btn); color: var(--primary-btn); }

        .toggle-btn { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .toggle-content { display: none; padding-top: 15px; }

        .copyright { text-align: center; font-size: 0.7rem; color: var(--text-secondary); margin-top: 20px; }
        hr { border: 0; border-top: 1px solid #334155; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo">
        <h2 style="margin:0;">Bobin Hesap Pro</h2>
    </div>

    <div class="card">
        <h3>Bobin Özellikleri</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group"><label>Kilo (kg)</label><input type="number" id="kilo" value="8000"></div>
            <div class="input-group"><label>Genişlik (mm)</label><input type="number" id="genislik" value="1209"></div>
            <div class="input-group"><label>Kalınlık (mm)</label><input type="number" id="kalinlik" value="1.11"></div>
            <div class="input-group"><label>Göbek Çapı (cm)</label><input type="number" id="gobek" value="50.8"></div>
        </div>
        <div class="input-group">
            <label>Tam Bobin Et Kalınlığı (cm)</label>
            <input type="number" id="fullEt" readonly>
        </div>
    </div>

    <div class="card">
        <h3>Süreç Takibi</h3>
        <label>Şu Anki Et Kalınlığı (cm)</label>
        <input type="number" id="anEt" value="10">

        <div class="progress-container">
            <div class="progress-bar" id="ilerlemeBar">0%</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group"><label>Şu An Saat</label><input type="time" id="ustBasSaat"></div>
            <div class="input-group"><label>Hedef Bitiş</label><input type="time" id="ustHedefSaat"></div>
        </div>
        <div class="input-group">
            <label>Gidilen Hız (m/d)</label>
            <input type="number" id="ustHiz" value="10">
        </div>
        <div id="sonuc" class="result-box">Hesaplanıyor...</div>
    </div>

    <div class="card">
        <div class="toggle-btn" onclick="toggleSection('planAlan')">
            <h3 style="margin:0; border:none;">Vardiya Planlayıcı</h3>
            <span>▼</span>
        </div>
        <div id="planAlan" class="toggle-content">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group"><label>Başlangıç</label><input type="time" id="planBas"></div>
                <div class="input-group"><label>Hedef Bitiş</label><input type="time" id="planHedef"></div>
            </div>
            <label>Toplam Mola (Dakika)</label>
            <input type="number" id="molaSure" value="30">
            <button onclick="planla()" class="secondary">GEREKLİ HIZI HESAPLA</button>
            <div id="planSonuc" class="result-box">Değerleri girip hesaplayın.</div>
        </div>
    </div>

    <div class="card">
        <div class="toggle-btn" onclick="toggleSection('ozelAlan')">
            <h3 style="margin:0; border:none; color: var(--primary-btn);">Özel Kesim Hesapları</h3>
            <span>▼</span>
        </div>
        <div id="ozelAlan" class="toggle-content">
            <div class="input-group"><label>Toplam Bobin Kilosu (kg)</label><input type="number" id="ozelKilo"></div>
            <div class="input-group"><label>Toplam Bobin Uzunluğu (m)</label><input type="number" id="ozelToplamMetre"></div>
            <div class="input-group"><label>Kesilen Uzunluk (m)</label><input type="number" id="ozelKesilen"></div>
            
            <button onclick="parcaHesapla()">KESİLEN PARÇA KİLOSU</button>
            <button onclick="ikiyeBol()" class="outline">BOBİNİ İKİYE BÖL (kg/2)</button>
            
            <div id="ozelSonuc" class="result-box">Hesaplama sonucu burada görünecek.</div>
        </div>
    </div>

    <div class="copyright">© 2026 Devrim Efe Şahin | Bobin Hesap Pro</div>
</div>

<script>
    // Dinamik input dinleyicileri
    const realTimeInputs = ['kilo', 'genislik', 'kalinlik', 'gobek', 'anEt', 'ustBasSaat', 'ustHedefSaat', 'ustHiz'];
    realTimeInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', hesapla);
    });

    function hesapla() {
        let kilo = parseFloat(document.getElementById("kilo").value) || 0;
        let genislik = (parseFloat(document.getElementById("genislik").value) || 0) / 1000;
        let kalinlik = (parseFloat(document.getElementById("kalinlik").value) || 0) / 1000;
        let gobekCap = (parseFloat(document.getElementById("gobek").value) || 0) / 100;
        let anEt = parseFloat(document.getElementById("anEt").value) || 0;
        const yogunluk = 7850;

        if (kilo <= 0 || genislik <= 0 || kalinlik <= 0) return;

        // Metraj ve Et Kalınlığı Hesabı
        let metreAgirlik = genislik * kalinlik * yogunluk;
        let toplamMetre = kilo / metreAgirlik;
        let r = gobekCap / 2;
        let R_full = Math.sqrt((toplamMetre * kalinlik / Math.PI) + (r * r));
        let fullEt = (R_full - r) * 100;
        
        document.getElementById("fullEt").value = fullEt.toFixed(1);

        // İlerleme Hesabı
        let R_now = r + (anEt / 100);
        let oran = (R_now * R_now - r * r) / (R_full * R_full - r * r);
        let kalanMetre = toplamMetre * oran;
        let yuzde = Math.max(0, Math.min(100, (1 - oran) * 100));

        const bar = document.getElementById("ilerlemeBar");
        bar.style.width = yuzde.toFixed(1) + "%";
        bar.innerText = "%" + yuzde.toFixed(1);

        // Sonuç Yazdırma
        let sonucHTML = `📏 <b>Toplam:</b> ${toplamMetre.toFixed(0)} m | <b>Kalan:</b> ${kalanMetre.toFixed(0)} m<br>`;
        
        // Bu hızla bitiş saati
        let basVal = document.getElementById("ustBasSaat").value;
        let hizVal = parseFloat(document.getElementById("ustHiz").value);
        if (basVal && hizVal > 0) {
            let bas = new Date("1970-01-01T" + basVal);
            let bitis = new Date(bas.getTime() + (kalanMetre / hizVal) * 60000);
            sonucHTML += `⏱️ <b>Bu Hızla Bitiş:</b> <span style="color:#10b981">${bitis.toTimeString().slice(0,5)}</span><br>`;
        }

        // Hedef saate yetişmek için gereken hız
        let hedefVal = document.getElementById("ustHedefSaat").value;
        if (basVal && hedefVal) {
            let bas = new Date("1970-01-01T" + basVal);
            let hedef = new Date("1970-01-01T" + hedefVal);
            if (hedef <= bas) hedef.setDate(hedef.getDate() + 1);
            
            let dakikaFark = (hedef - bas) / 60000;
            if (dakikaFark > 0) {
                let gerekenHiz = kalanMetre / dakikaFark;
                sonucHTML += `🚀 <b>Yetişmek İçin Hız:</b> <span style="color:#f59e0b">${gerekenHiz.toFixed(1)} m/d</span>`;
            }
        }

        document.getElementById("sonuc").innerHTML = sonucHTML;
    }

    function planla() {
        let kilo = parseFloat(document.getElementById("kilo").value) || 0;
        let genislik = parseFloat(document.getElementById("genislik").value) / 1000;
        let kalinlik = parseFloat(document.getElementById("kalinlik").value) / 1000;
        let metreAgirlik = genislik * kalinlik * 7850;
        let toplamMetre = kilo / metreAgirlik;

        let basVal = document.getElementById("planBas").value;
        let hedefVal = document.getElementById("planHedef").value;
        let mola = parseFloat(document.getElementById("molaSure").value) || 0;

        if (!basVal || !hedefVal) {
            document.getElementById("planSonuc").innerText = "Lütfen saatleri girin!";
            return;
        }

        let bas = new Date("1970-01-01T" + basVal);
        let hedef = new Date("1970-01-01T" + hedefVal);
        if (hedef <= bas) hedef.setDate(hedef.getDate() + 1);

        let netDakika = ((hedef - bas) / 60000) - mola;
        
        if (netDakika <= 0) {
            document.getElementById("planSonuc").innerText = "Mola süresi çalışma süresinden fazla!";
            return;
        }

        let gerekenHiz = toplamMetre / netDakika;
        document.getElementById("planSonuc").innerHTML = `
            <b>Net Süre:</b> ${netDakika.toFixed(0)} dk<br>
            <b>Gereken Hız:</b> <span style="color:#10b981; font-size:1.2rem;">${gerekenHiz.toFixed(1)} m/d</span>
        `;
    }

    // Özel Kesim Fonksiyonları
    function parcaHesapla() {
        let kilo = parseFloat(document.getElementById("ozelKilo").value);
        let toplam = parseFloat(document.getElementById("ozelToplamMetre").value);
        let kesilen = parseFloat(document.getElementById("ozelKesilen").value);
        if (kilo && toplam && kesilen) {
            let sonuc = kilo * (kesilen / toplam);
            document.getElementById("ozelSonuc").innerHTML = `✂️ Kesilen Parça: <b>${sonuc.toFixed(1)} kg</b>`;
        } else {
            document.getElementById("ozelSonuc").innerText = "Lütfen tüm alanları doldurun!";
        }
    }

    function ikiyeBol() {
        let kilo = parseFloat(document.getElementById("ozelKilo").value);
        if (kilo) {
            document.getElementById("ozelSonuc").innerHTML = `⚖️ Yarı Bobin: <b>${(kilo / 2).toFixed(1)} kg</b>`;
        } else {
            document.getElementById("ozelSonuc").innerText = "Önce toplam kiloyu girin!";
        }
    }

    function toggleSection(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    // İlk yükleme
    window.onload = hesapla;
</script>

</body>
</html>
